<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DHEERAJ.OS — AI Engineer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --c:#00ffff;--p:#a855f7;--g:#10b981;--r:#ef4444;--y:#f59e0b;
  --bg:#000a14;--glass:rgba(0,10,24,0.92);--border:rgba(0,255,255,0.22);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Courier New',monospace;color:rgba(255,255,255,0.9);}

/* ── BG Canvas ── */
#bgc{position:fixed;inset:0;z-index:0;}

/* ── Scan + Vignette ── */
#scan{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);}
#vig{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(0,0,0,0.65) 100%);}

/* ── BOOT ── */
#boot{position:fixed;inset:0;z-index:3000;background:#000;
  display:flex;flex-direction:column;justify-content:center;padding:8vh 10vw;transition:opacity .9s;}
#boot-logo{color:var(--c);font-size:clamp(26px,4.5vw,52px);font-weight:bold;
  letter-spacing:16px;margin-bottom:36px;text-shadow:0 0 40px var(--c),0 0 80px rgba(0,255,255,0.25);}
#boot-hr{width:100%;height:1px;background:linear-gradient(90deg,var(--c),transparent);margin-bottom:28px;opacity:.4;}
#boot-text{font-size:clamp(10px,1.4vw,12.5px);line-height:2.4;color:rgba(0,255,255,0.7);max-width:640px;}
.bl{opacity:0;}.ok{color:var(--g);}.dm{color:rgba(255,255,255,0.22);}
#bcur{display:inline-block;width:7px;height:12px;background:var(--c);vertical-align:middle;animation:bc .7s infinite;}
@keyframes bc{0%,100%{opacity:1}50%{opacity:0}}

/* ── DESKTOP ── */
#desk{position:fixed;inset:0;z-index:2;opacity:0;transition:opacity 1s;
  display:flex;flex-direction:column;}

/* ── MAIN AREA ── */
#main{flex:1;display:flex;align-items:stretch;overflow:hidden;position:relative;}

/* ── SIDE NAV ── */
#sidenav{
  width:160px;flex-shrink:0;display:flex;flex-direction:column;
  padding:24px 0 24px 0;gap:4px;z-index:10;
  background:rgba(0,6,16,0.7);backdrop-filter:blur(16px);
  border-right:1px solid var(--border);}
#sn-logo{padding:0 16px 20px;color:var(--c);font-size:11px;letter-spacing:5px;
  font-weight:bold;text-shadow:0 0 14px var(--c);border-bottom:1px solid var(--border);margin-bottom:12px;}
.sni{padding:11px 20px;font-size:10px;letter-spacing:2px;cursor:pointer;
  color:rgba(255,255,255,0.4);border-left:2px solid transparent;transition:all .2s;
  display:flex;align-items:center;gap:9px;}
.sni:hover{color:rgba(255,255,255,0.8);background:rgba(0,255,255,0.04);}
.sni.active{color:var(--c);border-left-color:var(--c);background:rgba(0,255,255,0.06);}
.sni-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;
  box-shadow:0 0 6px currentColor;}

/* ── STAGE ── */
#stage{flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;}

/* Arrow navigation */
.arr{position:absolute;top:50%;transform:translateY(-50%);
  width:44px;height:80px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:20;color:rgba(0,255,255,0.5);font-size:28px;
  border:1px solid rgba(0,255,255,0.12);border-radius:6px;
  background:rgba(0,12,28,0.7);backdrop-filter:blur(10px);
  transition:all .2s;user-select:none;}
.arr:hover{color:var(--c);border-color:rgba(0,255,255,0.4);
  background:rgba(0,255,255,0.08);box-shadow:0 0 20px rgba(0,255,255,0.12);}
#arrl{left:12px;}
#arrr{right:12px;}

/* ── HOLOGRAPHIC PANEL WRAPPER ── */
#holo-outer{
  position:relative;
  width:min(780px,calc(100vw - 200px));
  /* perspective lives here so 3D tilt works */
  perspective:1100px;
  perspective-origin:50% 50%;
}

/* The 3D-tilting element */
#tilt{
  width:100%;
  transform-style:preserve-3d;
  transition:transform .08s linear, opacity .35s ease;
  position:relative;
}

/* The actual panel */
#panel{
  width:100%;
  height:min(560px,calc(100dvh - 160px));
  background:var(--glass);
  border:1px solid rgba(0,255,255,0.28);
  border-radius:12px;
  overflow:hidden;
  position:relative;
  display:flex;flex-direction:column;
  box-shadow:
    0 0 0 1px rgba(0,255,255,0.06) inset,
    0 0 40px rgba(0,0,0,0.8),
    0 0 30px rgba(0,255,255,0.08),
    0 0 60px rgba(0,255,255,0.04);
  animation:holoFlicker 8s infinite;
}
@keyframes holoFlicker{
  0%,89%,91%,93%,100%{opacity:1}
  90%{opacity:.94}92%{opacity:.97}
}

/* Holographic scan sweep */
#sweep{
  position:absolute;inset:0;pointer-events:none;z-index:40;overflow:hidden;
  border-radius:12px;
}
#sweep::before{
  content:'';position:absolute;left:0;right:0;
  height:50%;
  background:linear-gradient(to bottom,transparent 0%,rgba(0,255,255,0.03) 45%,rgba(0,255,255,0.06) 50%,rgba(0,255,255,0.03) 55%,transparent 100%);
  animation:sweep 5s linear infinite;
}
@keyframes sweep{from{top:-50%}to{top:100%}}

/* Holographic grid overlay */
#hgrid{
  position:absolute;inset:0;pointer-events:none;z-index:39;border-radius:12px;
  background-image:
    linear-gradient(rgba(0,255,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,255,0.025) 1px,transparent 1px);
  background-size:40px 40px;
}

/* Corner accents */
.corner{position:absolute;width:16px;height:16px;z-index:41;
  border-color:var(--c);border-style:solid;opacity:.8;}
.ctL{top:8px;left:8px;border-width:1.5px 0 0 1.5px;}
.cTR{top:8px;right:8px;border-width:1.5px 1.5px 0 0;}
.cBL{bottom:8px;left:8px;border-width:0 0 1.5px 1.5px;}
.cBR{bottom:8px;right:8px;border-width:0 1.5px 1.5px 0;}

/* Side data streams */
.data-stream{
  position:absolute;top:12px;bottom:12px;width:18px;z-index:41;
  font-size:7px;color:rgba(0,255,255,0.18);letter-spacing:1px;
  overflow:hidden;display:flex;flex-direction:column;gap:2px;line-height:1.4;}
.ds-l{left:4px;text-align:left;}
.ds-r{right:4px;text-align:right;}

/* Projector beam */
#beam{
  position:absolute;bottom:-70px;left:50%;transform:translateX(-50%);
  width:min(400px,80%);height:70px;pointer-events:none;z-index:0;
  background:linear-gradient(to bottom,rgba(0,255,255,0.09),transparent);
  clip-path:polygon(15% 0,85% 0,100% 100%,0% 100%);
  filter:blur(10px);
}

/* Top edge glow */
#tEdge{
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);
  box-shadow:0 0 12px var(--c);z-index:42;
}

/* Window chrome (titlebar) */
#chrome{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:rgba(0,20,44,0.7);border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:42;
}
.cdots{display:flex;gap:6px;}
.cdot{width:11px;height:11px;border-radius:50%;cursor:pointer;transition:filter .2s;}
.cdot:hover{filter:brightness(1.4);}
.cRed{background:#ff5f57;}.cYel{background:#ffbd2e;}.cGrn{background:#28c840;}
#ptitle{flex:1;text-align:center;font-size:10px;letter-spacing:4px;
  color:rgba(0,255,255,0.75);font-weight:bold;}
#pcnt{font-size:9px;color:rgba(0,255,255,0.35);letter-spacing:2px;}

/* Status bar below title */
#statusbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 16px;background:rgba(0,0,0,0.25);border-bottom:1px solid rgba(0,255,255,0.08);
  font-size:8px;color:rgba(0,255,255,0.3);letter-spacing:2px;flex-shrink:0;}

/* Scrollable content */
#content{
  flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;
  scrollbar-width:thin;scrollbar-color:rgba(0,255,255,0.15) transparent;}
#content::-webkit-scrollbar{width:3px;}
#content::-webkit-scrollbar-thumb{background:rgba(0,255,255,0.18);border-radius:2px;}

/* ── BOTTOM DOTS ── */
#dotnav{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:20;}
.dn{width:7px;height:7px;border-radius:50%;border:1.5px solid rgba(0,255,255,0.3);
  cursor:pointer;transition:all .2s;}
.dn.on{background:var(--c);border-color:var(--c);box-shadow:0 0 8px var(--c);}

/* ── TASKBAR ── */
#tkb{
  height:40px;background:rgba(0,4,12,0.94);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;align-items:center;
  padding:0 14px;gap:10px;z-index:100;flex-shrink:0;}
#tkbl{color:var(--c);font-size:10px;letter-spacing:5px;font-weight:bold;
  text-shadow:0 0 10px var(--c);flex-shrink:0;padding-right:12px;border-right:1px solid var(--border);}
#tkbm{flex:1;display:flex;gap:5px;}
.ta{padding:3px 10px;border-radius:3px;font-size:9px;letter-spacing:1px;
  color:rgba(255,255,255,0.4);border:1px solid transparent;cursor:pointer;
  transition:all .15s;font-family:inherit;}
.ta.on{color:var(--c);border-color:rgba(0,255,255,0.25);background:rgba(0,255,255,0.05);}
.ta:hover{background:rgba(255,255,255,0.04);}
#tkbr{display:flex;align-items:center;gap:12px;}
.tst{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;}
#clk{font-size:10px;color:rgba(255,255,255,0.6);letter-spacing:2px;min-width:72px;text-align:right;}

/* ── NOTIFICATION ── */
#notif{position:fixed;top:16px;right:16px;z-index:9999;
  background:rgba(0,10,24,0.95);border:1px solid rgba(0,255,255,0.3);border-radius:10px;
  padding:12px 16px;font-size:9px;backdrop-filter:blur(20px);
  box-shadow:0 4px 24px rgba(0,0,0,0.5),0 0 20px rgba(0,255,255,0.07);
  opacity:0;transform:translateX(14px);transition:all .3s;pointer-events:none;max-width:250px;line-height:1.8;}
#notif.show{opacity:1;transform:translateX(0);}
#nt{color:var(--c);letter-spacing:2px;margin-bottom:2px;}

/* ── PANEL CONTENT STYLES ── */
/* Profile */
.ph{display:flex;align-items:center;gap:16px;margin-bottom:18px;
  padding-bottom:16px;border-bottom:1px solid rgba(0,255,255,0.1);}
.av{width:62px;height:62px;border-radius:50%;border:2px solid var(--c);flex-shrink:0;
  background:linear-gradient(135deg,rgba(0,255,255,0.1),rgba(168,85,247,0.1));
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 0 20px rgba(0,255,255,0.18);}
.pn{font-size:16px;font-weight:bold;letter-spacing:3px;color:#fff;}
.pr{font-size:9px;color:var(--c);letter-spacing:2px;margin-top:3px;}
.ps{font-size:8.5px;color:rgba(255,255,255,0.45);margin-top:3px;line-height:1.7;}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:12px 0;}
.ic{background:rgba(0,255,255,0.03);border:1px solid rgba(0,255,255,0.1);
  border-radius:6px;padding:7px 10px;}
.icl{font-size:7.5px;color:rgba(0,255,255,0.55);letter-spacing:1.5px;}
.icv{font-size:9px;color:rgba(255,255,255,0.82);margin-top:2px;}
.sr{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.slb{font-size:8.5px;color:rgba(255,255,255,0.4);width:120px;letter-spacing:.3px;}
.st{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.sf{height:100%;border-radius:2px;background:var(--c);box-shadow:0 0 5px var(--c);
  animation:sfx 1.4s ease-out both;}
@keyframes sfx{from{width:0!important}}
.sp2{font-size:8.5px;color:var(--c);width:30px;text-align:right;}
.abts{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap;}
.abt{padding:6px 12px;border-radius:5px;font-size:9px;letter-spacing:2px;cursor:pointer;
  border:1px solid var(--c);background:rgba(0,255,255,0.05);color:var(--c);
  transition:all .2s;font-family:inherit;}
.abt:hover{background:rgba(0,255,255,0.13);box-shadow:0 0 12px rgba(0,255,255,0.15);}

/* Projects */
.pg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.pc{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);
  border-radius:7px;padding:12px;position:relative;overflow:hidden;transition:all .18s;}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--a);box-shadow:0 0 8px var(--a);}
.pc:hover{border-color:rgba(0,255,255,0.15);background:rgba(0,255,255,0.03);transform:translateY(-2px);}
.ptx{font-size:9px;font-weight:bold;letter-spacing:.6px;color:#fff;margin-bottom:3px;line-height:1.3;}
.ptc{font-size:7.5px;color:rgba(0,255,255,0.5);margin-bottom:8px;}
.prl{list-style:none;}
.prl li{font-size:8px;color:rgba(255,255,255,0.68);padding:1.5px 0 1.5px 10px;position:relative;line-height:1.5;}
.prl li::before{content:'›';position:absolute;left:0;color:var(--a);}

/* Skills */
.term{font-size:11px;line-height:2.1;}
.tl2{opacity:0;transition:opacity .08s;}
.tl2.sh{opacity:1;}
.tc2{color:var(--p);font-weight:bold;}.tv2{color:rgba(255,255,255,0.8);}.tok2{color:var(--g);}.tdm2{color:rgba(255,255,255,0.22);}

/* Contact */
.cr{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.cic{font-size:17px;width:26px;text-align:center;}
.cn2{flex:1;}
.clb2{font-size:7.5px;color:rgba(255,255,255,0.35);letter-spacing:2px;}
.cv2{font-size:10px;color:rgba(255,255,255,0.85);margin-top:2px;word-break:break-all;}
.cpb{font-size:8px;padding:4px 9px;border-radius:4px;border:1px solid rgba(0,255,255,0.2);
  background:rgba(0,255,255,0.05);color:var(--c);cursor:pointer;transition:all .2s;
  font-family:inherit;letter-spacing:1px;}
.cpb:hover{background:rgba(0,255,255,0.12);}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(16,185,129,0.07);
  border:1px solid rgba(16,185,129,0.22);border-radius:20px;padding:4px 12px;
  font-size:8.5px;color:var(--g);margin-top:12px;letter-spacing:1px;}
.dg{width:5px;height:5px;border-radius:50%;background:var(--g);
  box-shadow:0 0 6px var(--g);animation:dgp 2s infinite;}
@keyframes dgp{0%,100%{box-shadow:0 0 4px var(--g)}50%{box-shadow:0 0 12px var(--g)}}

/* ── PROJECT MODAL ── */
#modal-bg{position:fixed;inset:0;z-index:4000;background:rgba(0,0,0,0.75);
  backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;}
#modal-bg.open{opacity:1;pointer-events:all;}
#modal{
  width:min(640px,92vw);max-height:80vh;
  background:rgba(0,8,22,0.97);border:1px solid rgba(0,255,255,0.35);border-radius:12px;
  overflow:hidden;display:flex;flex-direction:column;position:relative;
  box-shadow:0 0 0 1px rgba(0,255,255,0.08) inset,0 0 50px rgba(0,255,255,0.12),0 20px 60px rgba(0,0,0,0.9);
  transform:scale(0.88) rotateX(8deg);transition:transform .35s cubic-bezier(.2,0,.1,1);}
#modal-bg.open #modal{transform:scale(1) rotateX(0deg);}
#modal-top{width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--c),transparent);
  box-shadow:0 0 12px var(--c);}
#modal-chrome{display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:rgba(0,18,40,0.8);border-bottom:1px solid rgba(0,255,255,0.12);}
#modal-title{flex:1;text-align:center;font-size:10px;letter-spacing:3px;color:rgba(0,255,255,0.8);font-weight:bold;}
#modal-close{width:22px;height:22px;border-radius:50%;background:#ff5f57;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(0,0,0,0.7);
  font-weight:bold;transition:filter .2s;border:none;font-family:inherit;}
#modal-close:hover{filter:brightness(1.3);}
#modal-body{overflow-y:auto;padding:22px 24px;
  scrollbar-width:thin;scrollbar-color:rgba(0,255,255,0.15) transparent;}
#modal-body::-webkit-scrollbar{width:3px;}
#modal-body::-webkit-scrollbar-thumb{background:rgba(0,255,255,0.18);border-radius:2px;}
#modal-header{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(0,255,255,0.1);}
#modal-name{font-size:15px;font-weight:bold;letter-spacing:2px;color:#fff;margin-bottom:4px;}
#modal-tech{font-size:9px;color:rgba(0,255,255,0.6);letter-spacing:1.5px;}
.modal-section{margin-bottom:16px;}
.ms-label{font-size:8px;color:rgba(0,255,255,0.45);letter-spacing:3px;
  margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(0,255,255,0.08);}
.ms-list{list-style:none;}
.ms-list li{font-size:10.5px;color:rgba(255,255,255,0.78);padding:5px 0 5px 16px;
  position:relative;line-height:1.6;border-bottom:1px solid rgba(255,255,255,0.03);}
.ms-list li::before{content:'▸';position:absolute;left:0;font-size:10px;color:var(--a,#00ffff);}
/* hint on card */
.pc-hint{font-size:7.5px;color:rgba(0,255,255,0.35);letter-spacing:1px;
  margin-top:8px;text-align:right;transition:color .2s;}
.pc:hover .pc-hint{color:rgba(0,255,255,0.6);}
/* ── RESPONSIVE ── */

/* Tablet (641–1024px) */
@media(max-width:1024px){
  #sidenav{width:130px;}
  .sni{font-size:9px;padding:10px 14px;}
  #holo-outer{width:calc(100vw - 180px);}
  .pg{grid-template-columns:1fr 1fr;}
  #panel{height:min(520px,calc(100dvh - 150px));}
}

/* Mobile (≤640px) — no side nav, full-width panel */
@media(max-width:640px){
  /* Hide side nav — use taskbar + arrows only */
  #sidenav{display:none;}

  /* Panel fills available width between arrows */
  #holo-outer{width:calc(100vw - 76px);}
  #panel{
    height:calc(100dvh - 110px);
    border-radius:8px;
  }

  /* Arrows smaller, tighter to edges */
  .arr{width:28px;height:56px;font-size:20px;border-radius:4px;}
  #arrl{left:4px;}
  #arrr{right:4px;}

  /* Dot nav closer to bottom */
  #dotnav{bottom:8px;}

  /* Project grid: 2 columns */
  .pg{grid-template-columns:1fr 1fr;gap:7px;}
  .pc{padding:9px;}
  .ptx{font-size:8px;}
  .ptc{font-size:7px;}
  .prl li{font-size:7.5px;}
  .pc-hint{font-size:7px;}

  /* Skills terminal smaller text */
  .term{font-size:9.5px;line-height:1.9;}

  /* Profile info grid stacked */
  .ig{grid-template-columns:1fr 1fr;}
  .ph{gap:12px;}
  .av{width:48px;height:48px;font-size:20px;}
  .pn{font-size:13px;}
  .pr{font-size:8px;}
  .ps{font-size:8px;}
  .slb{width:90px;font-size:8px;}

  /* Taskbar compact */
  #tkbl{display:none;}
  .ta{font-size:8px;padding:2px 7px;}
  #tst{display:none;}
  #clk{font-size:9px;}

  /* Status bar compact */
  #statusbar{font-size:7px;padding:4px 10px;}

  /* Chrome compact */
  #chrome{padding:8px 12px;}
  #ptitle{font-size:9px;letter-spacing:2px;}

  /* Content padding */
  #content{padding:14px;}

  /* Boot text smaller */
  #boot-text{font-size:10px;}
  #boot-logo{font-size:clamp(20px,6vw,36px);letter-spacing:8px;}

  /* Modal nearly full screen */
  #modal{width:94vw;max-height:88dvh;border-radius:10px;}
  #modal-body{padding:16px;}
  .ms-list li{font-size:9.5px;}

  /* Hide decorative data streams on mobile */
  .data-stream{display:none;}
}

/* Small mobile (≤400px) */
@media(max-width:400px){
  .pg{grid-template-columns:1fr;}
  #holo-outer{width:calc(100vw - 68px);}
  .ig{grid-template-columns:1fr;}

renderer.setSize(innerWidth,innerHeight);
const sc=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,.1,100);
cam.position.z=20;

const N=90,npos=[],nGeo=new THREE.SphereGeometry(.07,6,6);
const COLS=[0x00ffff,0xa855f7,0x10b981,0x3b82f6,0xf59e0b];
const nMeshes=[];
for(let i=0;i<N;i++){
  const x=(Math.random()-.5)*36,y=(Math.random()-.5)*20,z=(Math.random()-.5)*18;
  npos.push(new THREE.Vector3(x,y,z));
  const mat=new THREE.MeshBasicMaterial({color:COLS[i%COLS.length],transparent:true,opacity:Math.random()*.4+.12});
  const m=new THREE.Mesh(nGeo,mat); m.position.set(x,y,z);
  m.userData={b:mat.opacity,o:Math.random()*Math.PI*2};
  sc.add(m); nMeshes.push(m);
}
const edgeList=[];
for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
  const d=npos[i].distanceTo(npos[j]);
  if(d<7){
    const g=new THREE.BufferGeometry().setFromPoints([npos[i],npos[j]]);
    sc.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0x00ffff,transparent:true,opacity:(1-d/7)*.13})));
    edgeList.push({a:npos[i],b:npos[j]});
  }
}
const pGeo=new THREE.SphereGeometry(.055,4,4);
const pkts=[];
for(let i=0;i<40;i++){
  const mat=new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:.9});
  const m=new THREE.Mesh(pGeo,mat); sc.add(m);
  pkts.push({e:edgeList[i%edgeList.length],t:Math.random(),sp:.003+Math.random()*.006,m});
}
let bt=0,mxBg=0,myBg=0;
function bgLoop(){
  requestAnimationFrame(bgLoop); bt+=.004;
  sc.rotation.y+=(Math.sin(bt*.08)*.2+mxBg*.06-sc.rotation.y)*.03;
  sc.rotation.x+=(Math.sin(bt*.05)*.1+myBg*.04-sc.rotation.x)*.03;
  nMeshes.forEach(n=>n.material.opacity=n.userData.b*(.5+.5*Math.sin(bt*1.3+n.userData.o)));
  pkts.forEach(p=>{
    p.t+=p.sp; if(p.t>1){p.t=0;p.e=edgeList[Math.floor(Math.random()*edgeList.length)];}
    p.m.position.lerpVectors(p.e.a,p.e.b,p.t);
    p.m.material.opacity=.4+.6*Math.sin(p.t*Math.PI);
  });
  renderer.render(sc,cam);
}

document.addEventListener('mousemove',e=>{
  mxBg=(e.clientX/innerWidth-.5)*2;

  targetRX=-(e.clientY/innerHeight-.5)*10;
  targetRY=(e.clientX/innerWidth-.5)*14;
});

  requestAnimationFrame(tiltLoop);
  if(!tiltActive){trx+=(0-trx)*.08;try_+=(0-try_)*.08;}
  else{trx+=(targetRX-trx)*.06;try_+=(targetRY-try_)*.06;}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('modal-bg').addEventListener('click',e=>{
    if(e.target===document.getElementById('modal-bg')) closeProject();
  });
});
// Close on Escape
window.addEventListener('keydown',e=>{ if(e.key==='Escape') closeProject(); });

function cp(txt,btn){
  navigator.clipboard.writeText(txt).then(()=>{
    const o=btn.textContent;btn.textContent='✓';btn.style.color='#10b981';btn.style.borderColor='#10b981';
    setTimeout(()=>{btn.textContent=o;btn.style.color='';btn.style.borderColor='';},1600);
  });
}

const builders=[buildProfile,buildProjects,buildSkills,buildContact];

// ── NAVIGATION ────────────────────────────────────────────────────────
let curr=0,busy=false,skillsBuilt=false;

function goTo(idx,instant){
  if(busy||idx===curr&&!instant)return;
  const dir=idx>curr?1:-1;
  curr=idx;
  _animate(instant?0:dir);
}

function nav(dir){
  if(busy)return;
  const next=(curr+(dir||1)+4)%4;
  if(next===curr)return;
  const d=dir||1;
  curr=next;
  _animate(d);
}

function _animate(dir){
  busy=true;tiltActive=false;
  const content=document.getElementById('content');
  const s=SECTIONS[curr];

  // Update UI immediately
  document.getElementById('ptitle').textContent=s.title;
  document.getElementById('pcnt').textContent=s.cnt;
  document.getElementById('spath').textContent=s.path;
  document.querySelectorAll('.sni').forEach((el,i)=>el.classList.toggle('active',i===curr));
  document.querySelectorAll('.ta').forEach((el,i)=>el.classList.toggle('on',i===curr));
  document.querySelectorAll('.dn').forEach((el,i)=>el.classList.toggle('on',i===curr));

  if(dir===0){
    // Instant (first load)
    content.innerHTML=builders[curr]();
    activateContent();
    busy=false;tiltActive=!isTouchDevice;
    return;
  }

  // Exit animation
  tiltEl.style.transition='transform .38s cubic-bezier(.4,0,.2,1), opacity .28s';
  tiltEl.style.transform=`rotateX(${trx}deg) rotateY(${try_+dir*-28}deg) scale(0.92)`;
  tiltEl.style.opacity='0.15';

  setTimeout(()=>{
    content.innerHTML=builders[curr]();

    // Enter from opposite
    tiltEl.style.transition='none';
    tiltEl.style.transform=`rotateX(0deg) rotateY(${dir*28}deg) scale(0.92)`;
    tiltEl.style.opacity='0.15';

    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      tiltEl.style.transition='transform .42s cubic-bezier(.2,0,.1,1), opacity .32s';
      tiltEl.style.transform='rotateX(0deg) rotateY(0deg) scale(1)';
      tiltEl.style.opacity='1';
      activateContent();
      setTimeout(()=>{busy=false;tiltActive=!isTouchDevice;},440);
    }));
  },300);
}

function activateContent(){
  // Animate skill lines in if on skills panel
  if(curr===2){
    requestAnimationFrame(()=>{
      document.querySelectorAll('.tl2').forEach((el,i)=>{
        setTimeout(()=>el.classList.add('sh'),i*55+100);
      });
    });
  }
  // Trigger stat bar animations
  if(curr===0){
    requestAnimationFrame(()=>{
      document.querySelectorAll('.sf').forEach(el=>{
        const w=el.style.width;el.style.width='0';
        requestAnimationFrame(()=>{el.style.width=w;});
      });
    });
  }
}

// Keyboard
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nav(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') nav(-1);
  if(e.key>='1'&&e.key<='4') goTo(+e.key-1);
});

// Swipe
let sx=0;
document.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx;
  if(Math.abs(dx)>50) nav(dx<0?1:-1);
},{passive:true});
</script>
